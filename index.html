max?.[0]??0)}°｜雨${da.precipitation_probability_max?.[0]??'-'}%<br>明 ${Math.round(da.temperature_2m_min?.[1]??0)}-${Math.round(da.temperature_2m_max?.[1]??0)}°｜雨${da.precipitation_probability_max?.[1]??'-'}%</div></article>`}).join('');wu.textContent=new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});if(manual)toast('天氣已更新')}catch(err){wg.innerHTML=cities.map(c=>`<a class="wcard" href="https://www.google.com/search?q=${encodeURIComponent(c.name+' 日本 天氣')}" target="_blank" style="text-decoration:none"><b>${c.name}</b>讀取失敗<br>點我查詢</a>`).join('');wu.textContent='未連線'}}async function openWeatherDetail(k){const c=cities.find(x=>x.key===k);wt.textContent=c.name+'天氣詳情';wb.innerHTML='<p class="note">讀取中…</p>';wm.classList.add('show');try{let d=cache[k];if(!d){const r=await fetch(wurl(c));d=await r.json();cache[k]=d}const cur=d.current||{},da=d.daily||{},code=cur.weather_code??0,t=da.weather_code?.[0]??code,tm=da.weather_code?.[1]??t;wb.innerHTML=`<div class="hero" style="margin-top:0"><div class="row"><div><small>目前天氣</small><h2>${ic(code)} ${Math.round(cur.temperature_2m??0)}°C</h2></div><div style="font-size:12px;line-height:1.7;color:#cbd5e1;text-align:right">體感 ${Math.round(cur.apparent_temperature??0)}°C<br>濕度 ${cur.relative_humidity_2m??'-'}%<br>風速 ${cur.wind_speed_10m??'-'} km/h</div></div><p class="wear">${wt[code]||'天氣變化'}。夏天關西午後雷雨很會臨時加戲，出門前刷新最保險。</p></div><div class="grid2" style="margin:12px 0"><div class="item"><b>今日 ${ic(t)} ${wt[t]||'-'}</b><p>高溫 ${Math.round(da.temperature_2m_max?.[0]??0)}°C<br>低溫 ${Math.round(da.temperature_2m_min?.[0]??0)}°C<br>降雨 ${da.precipitation_probability_max?.[0]??'-'}%</p></div><div class="item"><b>明日 ${ic(tm)} ${wt[tm]||'-'}</b><p>高溫 ${Math.round(da.temperature_2m_max?.[1]??0)}°C<br>低溫 ${Math.round(da.temperature_2m_min?.[1]??0)}°C<br>降雨 ${da.precipitation_probability_max?.[1]??'-'}%</p></div></div>`}catch(e){wb.innerHTML=`<a class="btn white" href="https://www.google.com/search?q=${encodeURIComponent(c.name+' 日本 天氣')}" target="_blank">Open‑Meteo 暫時讀取失敗，點我改用 Google 查詢</a>`}}function closeWeather(){wm.classList.remove('show')}function openPlace(n,a,no,map){const ad=n.includes('清水寺')?'清水寺の観光駐車場までお願いします。':a;mad=ad;mn.textContent=n;ma.textContent=ad;mnote.textContent='📍 '+no;mmap.href=map;place.classList.add('show')}function closePlace(){place.classList.remove('show')}function copyAddr(){copy(mad,'地址已複製')}function shareLine(){const d=D[day];let t=`✨ 2026 京阪奈自由行 Day ${day}\n${d.t}\n\n`;d.i.forEach(x=>t+=`⏰ ${x[0]}｜${x[1]}\n📍 ${x[3]}\n💡 ${x[4]}\n\n`);t+='🏡 住宿：JS暁宅・靜谷｜大阪市西成区鶴見橋1-15-21';copy(t,'當日行程已複製，可貼到 LINE')}async function copy(t,msg){try{await navigator.clipboard.writeText(t)}catch(e){const a=document.createElement('textarea');a.value=t;a.style.position='fixed';a.style.opacity=0;document.body.appendChild(a);a.select();document.execCommand('copy');a.remove()}toast(msg)}function showPdf(){const d=D[day],cards=d.i.map(x=>`<article class="pcard"><b>${e(x[0])}</b><strong>${e(x[1])}</strong><p>${e(x[4])}</p><p style="color:#64748b">📍 ${e(x[3])}</p></article>`).join('');pdfs.innerHTML=`<p class="k">KANSAI 2026｜DAY ${day}</p><h1>${e(d.t)}</h1><p class="note">${e(d.c)}</p>${cards}<p class="hint">住宿：JS暁宅・靜谷｜〒557-0031 大阪府大阪市西成区鶴見橋1-15-21</p>`;pdf.classList.add('show');document.body.style.overflow='hidden';toast('PDF 預覽已顯示在本頁')}function closePdf(){pdf.classList.remove('show');document.body.style.overflow=''}function printPdf(){const d=D[day],cards=d.i.map(x=>`<div class="print-card"><div><span class="print-time">${e(x[0])}</span> <b>${e(x[1])}</b></div><p class="print-note">${e(x[4])}</p><p>📍 ${e(x[3])}</p></div>`).join('');document.getElementById('print-area').innerHTML=`<h1>${e(d.t)}</h1><p>${e(d.c)}</p>${cards}<p>住宿：JS暁宅・靜谷｜〒557-0031 大阪府大阪市西成区鶴見橋1-15-21</p>`;setTimeout(()=>print(),80)}function scrollToTimeline(){timeline.scrollIntoView({behavior:'smooth',block:'start'})}function e(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function toast(msg){const x=document.getElementById('toast');x.textContent=msg;x.classList.add('show');clearTimeout(window.__t);window.__t=setTimeout(()=>x.classList.remove('show'),2400)}</script></body></html>
