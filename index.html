<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root{ --safe-bottom: env(safe-area-inset-bottom,0px); }
    *{ box-sizing:border-box; }
    html{ scroll-behavior:smooth; }
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Microsoft JhengHei",sans-serif;
      background:linear-gradient(180deg,#f8fafc 0%,#eef6ff 45%,#f8fafc 100%);
      color:#0f172a;
      -webkit-tap-highlight-color:transparent;
      overscroll-behavior-y:contain;
    }
    button,a{ touch-action:manipulation; }
    .app-shell{ max-width:480px; margin:0 auto; min-height:100vh; background:#fff; box-shadow:0 24px 70px rgba(15,23,42,.12); position:relative; overflow:hidden; }
    .soft-glass{ background:rgba(255,255,255,.88); backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px); }
    .no-scrollbar::-webkit-scrollbar{ display:none; }
    .no-scrollbar{ -ms-overflow-style:none; scrollbar-width:none; }
    .tab-safe{ padding-bottom:calc(14px + var(--safe-bottom)); }
    .card-shadow{ box-shadow:0 10px 30px rgba(15,23,42,.06); }
    .tap{ transition:transform .12s ease, opacity .12s ease, background-color .12s ease; }
    .tap:active{ transform:scale(.97); opacity:.88; }
    .line-clamp-2{ display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .weather-skeleton{ background:linear-gradient(90deg,#f1f5f9,#e2e8f0,#f1f5f9); background-size:200% 100%; animation:pulse 1.2s infinite; }
    @keyframes pulse{ 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    @media print{
      body{ background:white!important; }
      .no-print, nav, header, #bottom-nav, #toast, .modal-backdrop{ display:none!important; }
      .app-shell{ box-shadow:none; max-width:none; overflow:visible; }
      main{ padding:0!important; }
      #print-area{ display:block!important; }
      .print-card{ break-inside:avoid; page-break-inside:avoid; }
    }
  </style>
</head>
<body>
  <div id="app" class="app-shell">
    <header class="soft-glass sticky top-0 z-40 border-b border-slate-100">

            <p class="text-[11px] font-black tracking-[.18em] text-sky-600">KANSAI 2026</p>

          <button onclick="refreshWeather(true)" class="tap shrink-0 rounded-2xl bg-slate-900 px-3 py-2 text-[11px] font-black text-white shadow-lg shadow-slate-900/10">↻ 天氣</button>
        </div>

        <section class="mt-3 rounded-3xl border border-sky-100 bg-gradient-to-br from-sky-50 to-white p-3 card-shadow">
          <div class="flex items-center justify-between gap-2 mb-2">
            <div>
              <p class="text-[12px] font-black text-slate-900">日本氣象資訊</p>
              <p class="text-[10px] text-slate-500">即時體感、今日／明日高低溫與降雨機率</p>
            </div>
            <span id="weather-updated" class="text-[10px] font-bold text-slate-400">讀取中</span>
          </div>
          <div id="weather-grid" class="grid grid-cols-3 gap-2"></div>
          <div class="mt-2 grid grid-cols-3 gap-2 no-print">
            <button onclick="openWeatherDetail('osaka')" class="tap rounded-2xl border border-sky-100 bg-white px-2 py-2 text-center text-[10px] font-black text-sky-700 shadow-sm">Open‑Meteo<br>大阪詳情</button>
            <button onclick="openWeatherDetail('kyoto')" class="tap rounded-2xl border border-sky-100 bg-white px-2 py-2 text-center text-[10px] font-black text-sky-700 shadow-sm">Open‑Meteo<br>京都詳情</button>
            <button onclick="openWeatherDetail('nara')" class="tap rounded-2xl border border-sky-100 bg-white px-2 py-2 text-center text-[10px] font-black text-sky-700 shadow-sm">Open‑Meteo<br>奈良詳情</button>
          </div>
          <p class="mt-2 text-[10px] leading-relaxed text-slate-400">資料來源：Open-Meteo。上方按鈕會直接顯示該城市的可讀式天氣詳情，不會跳出原始 JSON；出門前再刷新一次，夏天午後雷雨像老闆臨時交辦，早知道早閃。</p>
        </section>
      </div>

      <div class="px-4 pb-3">
        <div id="day-tabs" class="flex gap-2 overflow-x-auto no-scrollbar snap-x"></div>
      </div>
    </header>

    <main class="px-4 pt-4 pb-28">
      <section id="itinerary-view">

        </div>

        <div id="day-hero" class="mt-4 rounded-3xl bg-slate-950 p-4 text-white card-shadow"></div>
        <div id="timeline" class="relative ml-3 mt-5 border-l-2 border-slate-100 space-y-5 pb-2"></div>
      </section>

      <section id="packing-view" class="hidden"></section>
      <section id="ticket-view" class="hidden"></section>
      <section id="hotel-view" class="hidden"></section>
    </main>

    <nav id="bottom-nav" class="soft-glass fixed bottom-0 left-1/2 z-40 grid w-full max-w-[480px] -translate-x-1/2 grid-cols-4 border-t border-slate-100 px-2 pt-2 tab-safe shadow-[0_-18px_40px_rgba(15,23,42,.08)]">

      <button onclick="switchMainTab('hotel')" id="nav-hotel" class="tap rounded-2xl py-2 text-[10px] font-black text-slate-400"><span class="block text-xl">🏡</span>民宿</button>
    </nav>
  </div>

  <div id="modal" class="modal-backdrop hidden fixed inset-0 z-50 items-end justify-center bg-slate-950/60 p-3 backdrop-blur-sm sm:items-center">
    <div class="w-full max-w-md rounded-[28px] bg-white p-5 shadow-2xl">
      <div class="flex items-start justify-between gap-3">
        <div>
          <p class="text-[10px] font-black text-rose-600">給司機／路人看的大字卡</p>
          <h3 id="modal-name" class="mt-1 text-sm font-black text-slate-900"></h3>
        </div>
        <button onclick="closeModal()" class="tap rounded-full bg-slate-100 px-3 py-2 text-xs font-black text-slate-500">✕</button>

      <div class="mt-4 grid grid-cols-2 gap-3">

        </div>

                <div class="font-mono text-sm font-black text-sky-700">${item.time}</div>
              </div>
              <div class="min-w-0 flex-1 text-right">
                <span class="inline-flex max-w-full items-center gap-1 rounded-full border px-2.5 py-1 text-[10px] font-black ${badge}"><span>${icon}</span><span class="truncate">${item.name}</span></span>
              </div>
            </div>
            <p class="mt-3 rounded-2xl bg-slate-50 p-3 text-[12px] leading-relaxed text-slate-600">${item.note}</p>
            <div class="mt-3 grid grid-cols-2 gap-2 no-print">
              <a href="${mapUrl}" target="_blank" rel="noopener noreferrer" class="tap rounded-2xl border border-slate-200 bg-white py-3 text-center text-[11px] font-black text-slate-700">🗺️ 地圖導航</a>
              <button onclick="openPlaceModal(${JSON.stringify(item.name)}, ${JSON.stringify(item.addr)}, ${JSON.stringify(item.note)}, ${JSON.stringify(mapUrl)})" class="tap rounded-2xl bg-slate-900 py-3 text-[11px] font-black text-white">🚕 問路大字</button>
            </div>
          </div>
        </article>`;
    }

    function renderStaticPanels(){
      document.getElementById('packing-view').innerHTML = panelWrap('🎒 盛夏打包清單', [
        ['📱','手持／掛脖小風扇','京都坡道與奈良戶外行程救命神器。'],
        ['🌂','抗 UV 晴雨傘','遮陽、防午後雷雨，一支扛兩種麻煩。'],
        ['🧴','防曬乳、濕紙巾、補水用品','流汗後補擦防曬，避免第一天就變烤蝦。'],
        ['👟','透氣防滑慢跑鞋','清水寺、奈良與大阪城都很吃腳力。'],
        ['💳','ICOCA / Suica','地鐵、近鐵、京阪與便利商店皆方便。'],
        ['🔋','行動電源與離線截圖','電子周遊券、地圖、天氣都靠手機，電量就是戰鬥力。']
      ]);
      document.getElementById('ticket-view').innerHTML = `
        <div class="rounded-3xl bg-slate-950 p-4 text-white card-shadow"><h2 class="text-base font-black">🎫 大阪周遊券電子版避雷</h2><p class="mt-2 text-xs leading-relaxed text-slate-300">重點只有一句：電子周遊券請掃 QR Code，不要拿去感應 ICOCA 區。</p></div>
        <div class="mt-4 space-y-3">
          ${infoBlock('⚠️ 不要用 NFC 感應','手機電子周遊券沒有一般交通卡感應功能，請找支援 QR Code 的閘門或窗口。','rose')}
          ${infoBlock('🚇 地鐵過閘','打開周遊券 QR Code 頁面，對準閘門讀取口掃描。手機亮度建議調高。','sky')}
          ${infoBlock('🏯 景點兌票','大阪城、Aqua-Liner、聖瑪麗亞號、Wonder Cruise 等，依現場規則掃 QR 或先換實體票。熱門船班建議先換票。','amber')}
          ${infoBlock('🔋 風險控管','截圖備援、行動電源充飽、同行者至少兩人保存 QR。不要讓手機電量比行程體力還先陣亡。','emerald')}
        </div>`;
      document.getElementById('hotel-view').innerHTML = `
        <div class="rounded-3xl bg-slate-950 p-4 text-white card-shadow"><h2 class="text-base font-black">🏡 JS暁宅・靜谷</h2><p class="mt-2 text-xs text-slate-300">大阪市西成區｜花園町、天下茶屋動線友善</p></div>
        <div class="mt-4 rounded-3xl border border-slate-100 bg-white p-4 card-shadow text-xs leading-relaxed text-slate-600">
          <p class="text-[10px] font-black text-slate-400">日文地址</p>
          <p class="mt-1 select-all text-sm font-black text-slate-900">〒557-0031 大阪府大阪市西成区鶴見橋1-15-21</p>
          <hr class="my-4 border-slate-100">
          <p class="text-[10px] font-black text-slate-400">英文地址</p>
          <p class="mt-1">1 Chome-15-21 Tsurumibashi, Nishinari Ward, Osaka, 557-0031, Japan</p>
          <div class="mt-4 rounded-2xl bg-amber-50 p-3 text-amber-900">退房日 11:00 前整理完成。可利用鶴見橋商店街往天下茶屋站，遮陽避雨，拖行李比較舒服。</div>
          <div class="mt-4 grid grid-cols-2 gap-2">
            <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent('大阪府大阪市西成区鶴見橋1-15-21')}" target="_blank" class="tap rounded-2xl bg-sky-600 py-3 text-center text-xs font-black text-white">🗺️ 地圖導航</a>
            <button onclick="openPlaceModal('JS暁宅・靜谷','〒557-0031 大阪府大阪市西成区鶴見橋1-15-21','花園町駅2番出口から徒歩約5分、鶴見橋商店街の中です。','https://www.google.com/maps/search/?api=1&query=${encodeURIComponent('大阪府大阪市西成区鶴見橋1-15-21')}')" class="tap rounded-2xl bg-slate-900 py-3 text-xs font-black text-white">🚕 問路大字</button>
          </div>
        </div>`;
    }

    function panelWrap(title, items){
      return `<div class="rounded-3xl bg-slate-950 p-4 text-white card-shadow"><h2 class="text-base font-black">${title}</h2><p class="mt-2 text-xs text-slate-300">輕量化、抗暑、抗迷路。</p></div><div class="mt-4 space-y-3">${items.map(([emoji,name,note]) => `<label class="tap flex gap-3 rounded-3xl border border-slate-100 bg-white p-4 card-shadow"><input type="checkbox" class="mt-1 h-5 w-5 accent-sky-600"><div><div class="text-sm font-black text-slate-900">${emoji} ${name}</div><p class="mt-1 text-xs leading-relaxed text-slate-500">${note}</p></div></label>`).join('')}</div>`;
    }
    function infoBlock(title, text, color){
      const map = { rose:'bg-rose-50 text-rose-900 border-rose-100', sky:'bg-sky-50 text-sky-900 border-sky-100', amber:'bg-amber-50 text-amber-900 border-amber-100', emerald:'bg-emerald-50 text-emerald-900 border-emerald-100' };
      return `<div class="rounded-3xl border p-4 ${map[color]}"><p class="text-sm font-black">${title}</p><p class="mt-1 text-xs leading-relaxed">${text}</p></div>`;
    }

    function openPlaceModal(name, addr, note, mapUrl){
      const addressText = name.includes('清水寺') ? '清水寺の観光駐車場までお願いします。' : addr;
      modalPayload = { address: addressText };
      document.getElementById('modal-name').textContent = name;
      document.getElementById('modal-address').textContent = addressText;
      document.getElementById('modal-note').textContent = '📍 ' + note;
      document.getElementById('modal-map').href = mapUrl;
      document.getElementById('modal').classList.remove('hidden');
      document.getElementById('modal').classList.add('flex');
    }
    function closeModal(){ document.getElementById('modal').classList.add('hidden'); document.getElementById('modal').classList.remove('flex'); }
    function copyModalAddress(){ copyText(modalPayload.address, '地址已複製'); }

    function shareTextItinerary(){
      const data = travelData[currentDay];
      let text = `✨ 2026 京阪奈自由行 Day ${currentDay}\n${data.title}\n\n`;
      data.items.forEach(i => { text += `⏰ ${i.time}｜${i.name}\n📍 ${i.addr}\n💡 ${i.note}\n\n`; });
      text += '🏡 住宿：JS暁宅・靜谷｜大阪市西成区鶴見橋1-15-21';
      copyText(text, '當日行程已複製，可貼到 LINE');
    }
    async function copyText(text, msg){
      try{ await navigator.clipboard.writeText(text); showToast(msg); }
      catch(e){
        const t=document.createElement('textarea'); t.value=text; t.style.position='fixed'; t.style.opacity=0; document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t); showToast(msg);
      }
    }
    function printCurrentDay(){ window.print(); }
    function showToast(msg){
      const el=document.getElementById('toast'); el.textContent=msg; el.classList.remove('opacity-0'); el.classList.add('opacity-100');
      clearTimeout(window.__toastTimer); window.__toastTimer=setTimeout(()=>{el.classList.add('opacity-0'); el.classList.remove('opacity-100');},2600);
    }
  </script>
</body>
</html>
